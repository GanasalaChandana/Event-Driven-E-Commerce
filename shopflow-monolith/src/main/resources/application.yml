server:
  port: ${PORT:8080}

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: shopflow
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shopflow_db}
    username: ${SPRING_DATASOURCE_USERNAME:shopflow}
    password: ${SPRING_DATASOURCE_PASSWORD:shopflow123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      fail-fast: false
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        max.block.ms: 5000
        request.timeout.ms: 5000
        delivery.timeout.ms: 10000
    consumer:
      group-id: shopflow-monolith-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.shopflow.*"

jwt:
  secret: ${JWT_SECRET:shopflow-super-secret-key-change-in-production-min-256-bits}
  expiration-ms: 86400000

kafka:
  topics:
    user-registered: user.registered
    order-created: order.created
    inventory-reserved: inventory.reserved
    inventory-failed: inventory.failed
    order-confirmed: order.confirmed
    order-cancelled: order.cancelled

inventory:
  stock:
    cache-ttl-seconds: 600

eureka:
  client:
    enabled: false

springdoc:
  pre-loading-enabled: false
  packages-to-scan: >
    com.shopflow.user.controller,
    com.shopflow.product.controller,
    com.shopflow.order.controller,
    com.shopflow.inventory.controller,
    com.shopflow.monolith.controller
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health, info
